      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Thmanyah Serif Text';
      src: url('https://alshhbaa.com/assets/fonts/Thmanyah-Font-Family/thmanyahseriftext-Regular.woff2') format('woff2');
