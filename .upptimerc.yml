      --submit-button-color: #c8a56b !important;
      --graph-opacity: 0.85 !important;
      --graph-filter: sepia(25%) hue-rotate(10deg) !important;
    }
    body {
      font-family: 'Thmanyah Serif Text', serif !important;
      direction: rtl;
      text-align: right;
      background: radial-gradient(ellipse at 60% 0%, rgba(200,165,107,0.08), transparent 50%), #002d24 !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1, h2, h3 {
      font-family: 'Thmanyah Serif Display', serif !important;
      letter-spacing: 0.02em;
    }
    nav, nav a, button, label, .tag, .badge, footer, input {
      font-family: 'Thmanyah Sans', sans-serif !important;
    }
    nav {
      backdrop-filter: blur(14px) saturate(1.4);
      border-bottom: 1px solid rgba(200,165,107,0.15) !important;
    }
    nav .container { direction: rtl; flex-direction: row-reverse; }
    nav ul { direction: rtl; }
    .site-status, article, .card {
      backdrop-filter: blur(10px);
      border-radius: 12px !important;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      transition: border-color 0.3s ease, transform 0.25s ease;
    }
    .site-status:hover, article:hover, .card:hover {
      border-color: rgba(200,165,107,0.35) !important;
      transform: translateY(-2px);
    }
    .site-status {
      border-left: none !important;
      border-right-width: 3px !important;
      border-right-style: solid !important;
    }
    a { color: #c8a56b !important; text-decoration: none; transition: opacity 0.2s ease; }
    a:hover { opacity: 0.8; }
    .f { direction: rtl; text-align: right; }
    .f.r, form.f.r { direction: rtl; }
    .site-status .content { text-align: right; }
    footer { opacity: 0.55; font-size: 0.875rem; direction: rtl; text-align: center; }
    .lead { direction: rtl; text-align: right; }
    ::selection { background: rgba(200,165,107,0.35); color: inherit; }
    @media (max-width: 640px) {
      nav .container { flex-direction: column; align-items: center; }
      nav ul { justify-content: center; gap: 0.5rem; }
    }
