# Nhasiat Al-Shhbaa — Status Page Configuration
# Only 2 endpoints: main site + form API

owner: Alshhbaa
repo: status
branch: main
user-agent: Nhasiat-Alshhbaa-Status-Bot

sites:
  - name: الموقع الرئيسي
    url: https://alshhbaa.com
    icon: https://alshhbaa.com/assets/favicons/favicon-96.png
    slug: website
  - name: محرك الرسائل (API)
    url: https://formsubmit.co
    slug: api
    expectedStatusCodes:
      - 200
      - 403

status-website:
  cname: status.alshhbaa.com
  name: نحاسيات الشهباء
  introTitle: "حالـة الخدمـات"
  introMessage: "هذه الصفحة تعرض حالة خدماتنا ومواقعنا بشكل مباشر"
  navbar:
    - title: حالة الخدمات
      href: /
    - title: الموقع الرئيسي
      href: https://alshhbaa.com
  logoUrl: https://alshhbaa.com/assets/logo-gold.svg
  hideNavTitle: true
  favicon: https://alshhbaa.com/assets/favicons/favicon-48.png
  customHeadHtml: >-
    <style>
    @font-face {
      font-family: 'Thmanyah Serif Display';
      src: url('https://alshhbaa.com/assets/fonts/Thmanyah-Font-Family/thmanyahserifdisplay-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Thmanyah Serif Text';
      src: url('https://alshhbaa.com/assets/fonts/Thmanyah-Font-Family/thmanyahseriftext-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Thmanyah Sans';
      src: url('https://alshhbaa.com/assets/fonts/Thmanyah-Font-Family/thmanyahsans-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Thmanyah Sans';
      src: url('https://alshhbaa.com/assets/fonts/Thmanyah-Font-Family/thmanyahsans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    :root {
      --body-background-color: #0a0806 !important;
      --body-text-color: #f4ede3 !important;
      --card-background-color: rgba(255,255,255,0.06) !important;
      --nav-background-color: rgba(18, 14, 10, 0.85) !important;
      --nav-border-bottom-color: rgba(255,255,255,0.08) !important;
      --nav-current-border-bottom-color: rgba(255,255,255,0.25) !important;
      --card-border-color: rgba(255,255,255,0.12) !important;
      --up-border-left-color: #2ecc71 !important;
      --down-border-left-color: #f87171 !important;
      --down-background-color: rgba(127,29,29,0.3) !important;
      --degraded-border-left-color: #f4c66b !important;
      --tag-color: #001b3a !important;
      --tag-up-background-color: #2ecc71 !important;
      --tag-down-background-color: #f87171 !important;
      --tag-degraded-background-color: #f4c66b !important;
      --change-background-color: #c8a56b !important;
      --error-button-border-color: rgba(200,165,107,0.3) !important;
      --error-button-background-color: rgba(200,165,107,0.12) !important;
      --error-button-color: #c8a56b !important;
      --submit-button-border-color: rgba(200,165,107,0.3) !important;
      --submit-button-background-color: rgba(200,165,107,0.12) !important;
      --submit-button-color: #c8a56b !important;
      --graph-opacity: 0.85 !important;
      --graph-filter: none !important;
    }
    body {
      font-family: 'Thmanyah Serif Text', serif !important;
      direction: rtl;
      text-align: right;
      background:
        url('https://alshhbaa.com/assets/images/leather-pattern-luxury.webp'),
        radial-gradient(ellipse at 30% 0%, rgba(200,165,107,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 100%, rgba(200,165,107,0.04) 0%, transparent 50%),
        #0a0806 !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* ═══ NAVBAR — Clean glass style matching main site ═══ */
    nav {
      backdrop-filter: blur(40px) saturate(2) !important;
      -webkit-backdrop-filter: blur(40px) saturate(2) !important;
      background: rgba(255, 255, 255, 0.06) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
      position: relative;
      z-index: 100;
    }
    nav .container {
      direction: rtl;
      flex-direction: row-reverse;
    }
    nav ul {
      direction: rtl;
      gap: 0.35rem;
    }
    nav ul li a {
      color: rgba(244, 237, 227, 0.75) !important;
      font-size: 0.92rem;
      padding: 0.5rem 0.95rem !important;
      border-radius: 999px;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1) !important;
      border: none !important;
    }
    nav ul li a:hover {
      color: #fff !important;
      background: rgba(255, 255, 255, 0.1) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12) !important;
      opacity: 1 !important;
      transform: translateY(-1px);
    }
    nav ul li a.active,
    nav ul li a[aria-current="page"] {
      color: #fff !important;
      background: rgba(255, 255, 255, 0.1) !important;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.18) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 20px rgba(0,0,0,0.15) !important;
    }
    .logo {
      position: relative;
      z-index: 1;
    }
    .logo img {
      height: 3.5rem !important;
      filter: drop-shadow(0 0 12px rgba(200, 165, 107, 0.2));
      transition: filter 0.3s ease;
    }
    .logo img:hover {
      filter: drop-shadow(0 0 20px rgba(200, 165, 107, 0.35));
    }
    /* ═══ HEADINGS ═══ */
    h1 {
      font-family: 'Thmanyah Serif Display', serif !important;
      font-feature-settings: 'salt' 1, 'ss01' 1, 'ss02' 1;
      letter-spacing: 0.02em;
      font-size: clamp(2rem, 4vw, 3rem) !important;
      color: #fff !important;
      text-shadow: 0 2px 20px rgba(200, 165, 107, 0.15);
    }
    h2, h3, h4 {
      font-family: 'Thmanyah Serif Display', serif !important;
      letter-spacing: 0.02em;
      color: #f4ede3 !important;
    }
    nav, nav a, button, label, .tag, .badge, footer, input {
      font-family: 'Thmanyah Sans', sans-serif !important;
    }
    /* ═══ GRAPH CARDS ═══ */
    article.graph {
      background: linear-gradient(180deg, rgba(255, 248, 239, 0.06), rgba(255, 248, 239, 0.025)) !important;
      backdrop-filter: blur(20px) saturate(1.4) !important;
      border: 1px solid rgba(235, 216, 182, 0.16) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08) !important;
      border-radius: 2rem !important;
      border-right: 1px solid rgba(235, 216, 182, 0.16) !important;
      transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      padding: 2rem !important;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    article.graph:hover {
      background: rgba(255, 255, 255, 0.04) !important;
      border-color: rgba(235, 216, 182, 0.35) !important;
      transform: translateY(-5px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 12px 40px rgba(0, 0, 0, 0.3) !important;
    }
    article.graph::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(200, 165, 107, 0.08), transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: -1;
    }
    article.graph:hover::after {
      opacity: 1;
    }
    /* ═══ GRAPH IMAGE DISPLAY — only graph images, not favicons ═══ */
    article.graph .graph-container img,
    article.graph .graph-container svg,
    article.graph img[alt*="graph"],
    article.graph img[alt*="Graph"],
    article.graph canvas {
      width: 100% !important;
      max-width: 100% !important;
      height: auto !important;
      min-height: 120px;
      display: block !important;
      border-radius: 1rem;
      opacity: 0.9;
    }
    /* Keep icons small */
    article.graph .icon,
    article.graph .icon img {
      width: auto !important;
      max-width: none !important;
      min-height: 0 !important;
      height: 13px !important;
      border-radius: 0 !important;
    }
    /* ═══ STATUS CARDS ═══ */
    .site-status, .card {
      backdrop-filter: blur(20px) saturate(1.4) !important;
      border-radius: 2rem !important;
      background: rgba(255, 248, 239, 0.06) !important;
      border: 1px solid rgba(235, 216, 182, 0.16) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08) !important;
    }
    /* Fix dark icon for FormSubmit */
    article:nth-of-type(2) .icon {
      filter: invert(1) brightness(1.5) contrast(1.2) !important;
    }
    /* ═══ LINKS ═══ */
    a {
      color: #c8a56b !important;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    a:hover {
      opacity: 0.85;
      text-shadow: 0 0 12px rgba(200, 165, 107, 0.2);
    }
    /* ═══ PERIOD FILTER LABELS ═══ */
    .f { direction: rtl; text-align: right; }
    .f.r, form.f.r { direction: rtl; }
    .r label {
      margin-left: 0 !important;
      margin-right: 1rem !important;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.88rem;
    }
    .r label:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(200,165,107,0.3);
    }
    .r input:checked + label {
      background: rgba(200,165,107,0.15) !important;
      border-color: rgba(200,165,107,0.4) !important;
      color: #c8a56b !important;
      box-shadow: 0 0 12px rgba(200, 165, 107, 0.1);
    }
    /* ═══ LAYOUT & MISC ═══ */
    .site-status .content { text-align: right; }
    footer {
      opacity: 0.45;
      font-size: 0.85rem;
      direction: rtl;
      text-align: center;
      padding: 2rem 0 !important;
    }
    .lead {
      direction: rtl;
      text-align: right;
      font-size: 1.05rem !important;
      color: rgba(244,237,227,0.7) !important;
    }
    ::selection { background: rgba(200,165,107,0.35); color: inherit; }
    .data {
      background: rgba(200,165,107,0.12) !important;
      color: #c8a56b !important;
      padding: 0.2rem 0.5rem !important;
      border-radius: 6px !important;
    }
    header { margin-bottom: 2.5rem !important; }
    section.live-status { margin-top: 1.5rem; }
    .icon { margin-right: 0 !important; margin-left: 0.33rem !important; }
    /* ═══ ERROR PAGE FIX ═══ */
    .error-page, .error {
      direction: rtl;
      text-align: center;
    }
    .error-page h1 {
      font-size: 1.5rem !important;
    }
    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 640px) {
      nav .container { flex-direction: column; align-items: center; }
      nav ul { justify-content: center; gap: 0.5rem; }
      nav ul li a { padding: 0.4rem 0.75rem !important; font-size: 0.85rem; }
      .r label { padding: 0.35rem 0.7rem; font-size: 0.8rem; margin-right: 0.5rem !important; }
      article.graph { padding: 1.25rem !important; border-radius: 1.25rem !important; }
      .site-status, .card { border-radius: 1.25rem !important; }
    }
    </style>

# Arabic i18n — full label translation
