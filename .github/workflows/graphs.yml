name: Graphs CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [graphs]
  workflow_dispatch:
jobs:
  release:
    name: Generate graphs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          ref: ${{ github.head_ref }}
      - name: Generate graphs
        uses: upptime/uptime-monitor@v1.41.0
          command: "graphs"
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
