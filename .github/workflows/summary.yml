name: Summary CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [summary]
  workflow_dispatch:
jobs:
  release:
    name: Generate README
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
          ref: ${{ github.head_ref }}
      - name: Update summary in README
        uses: upptime/uptime-monitor@v1.41.0
          command: "readme"
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
